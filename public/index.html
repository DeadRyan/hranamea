<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e1e1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stil de viață și alimentație sănătoasă</title>
    <meta name="description" content="Sfaturi și rețete pentru un stil de viață sănătos și o alimentație echilibrată. Meniu personalizat și sprijin pentru sănătate.">
    <meta name="keywords" content="stil de viață sănătos, alimentație sănătoasă, rețete sănătoase, planuri alimentare, sănătate, nutriție">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <style>
        /* Logo Styling */
        .logo-container {
            margin-bottom: 20px;
            text-align: center;
            width: 200px;
            height: auto;
            max-width: 100%;
        }
        .logo-container img {
            width: 100%;
            height: auto;
        }
        
        /* Responsive Dark Theme Styling */
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            background-color: #1e1e1e; /* Dark background */
            color: #e0e0e0; /* Light text color */
            margin: 0;
            min-height: 100vh;
            position: relative;
            -webkit-tap-highlight-color: transparent; /* Remove tap highlight on iOS */
            overscroll-behavior: contain; /* Prevent pull-to-refresh on mobile */
        }
        
        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #db23e8;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            color: #ffffff; /* White heading */
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
        }
        /* Responsive Button Container */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            width: 100%;
            max-width: 600px;
        }
        
        /* SVG icon styling */
        .stethoscope-svg {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            vertical-align: middle;
            display: inline-block;
        }
        
        /* Regime button styling */
        .regime-button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid #db23e8;
            border-radius: 5px;
            background-color: transparent;
            color: white;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 220px;
        }

        .regime-button.active {
            background-color: #db23e8;
        }

        .regime-button:hover {
            background-color: rgba(219, 35, 232, 0.3);
        }

        /* Disabled meal buttons */
        .meal-button.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .assistant-btn:hover {
            background-color: #1a2530;
        }
        button, .button { /* Style for main meal buttons and button-class anchors */
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #db23e8; /* Your desired button color */
            color: white; /* Keep text white */
            border: none;
            border-radius: 5px;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 110px;
            text-align: center;
            position: relative;
            overflow: hidden;
            touch-action: manipulation; /* Improve touch behavior */
        }
        
        button:active, .button:active {
            transform: scale(0.95); /* Slight scale down effect when touched */
            background-color: #c31fcb; /* Same as hover */
        }
        
        button::after, .button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(30, 30);
                opacity: 0;
            }
        }
        
        button:focus:not(:active)::after, .button:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }
        button:hover, .button:hover { /* Hover effect for main meal buttons */
            background-color: #c31fcb; /* Slightly darker shade for hover */
        }
        #recipe-display {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #444; /* Darker border */
            background-color: #2a2a2a; /* Slightly lighter dark background */
            color: #e0e0e0; /* Light text inside display */
            width: 100%;
            max-width: 600px;
            text-align: left;
            display: none; /* Hidden initially */
            border-radius: 5px; /* Rounded corners */
            box-sizing: border-box;
            max-height: 50vh; /* Limit height to 50% of viewport height */
            overflow-y: auto; /* Enable vertical scrolling */
        }
        #recipe-display h2 {
            margin-top: 0;
            color: #db23e8; /* Use button color for recipe title */
            font-size: 1.4rem;
        }
        /* Styles for Share/Save buttons */
        .action-buttons {
    margin-top: 15px;
    display: none; /* Hidden initially when no recipe is shown */
    width: 100%;
}
/* When visible, use flex display */
.action-buttons.visible {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    gap: 8px;
}
        .action-buttons button, .action-buttons .button { /* Style specifically for action buttons */
            background-color: #db23e8; /* Use same theme color */
            color: white;
            font-size: 14px;
            padding: 12px 15px; /* Larger padding for better touch targets */
            flex: 1;
            min-width: 140px;
            border-radius: 5px;
            touch-action: manipulation; /* Improve touch behavior */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Direct Facebook icon styling (more reliable) */
        .facebook-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background-color: white;
            border-radius: 2px;
            margin-right: 8px;
            position: relative;
            vertical-align: middle;
        }
        
        .facebook-icon::after {
            content: 'f';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #3b5998; /* Facebook blue */
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 14px;
        }
        
        /* Assistant button icon */
        .assistant-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            position: relative;
            vertical-align: middle;
        }
        
        .assistant-icon::before {
            content: '';
            position: absolute;
            left: 1px;
            top: 1px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid white;
            background-color: transparent;
        }
        
        .assistant-icon::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 4px;
            width: 2px;
            height: 8px;
            background-color: white;
            border-radius: 1px;
            box-shadow: 4px -3px 0 0 white;
            transform: rotate(30deg);
        }
        
        #btn-save::before {
            content: '💾 ';
            margin-right: 5px;
        }
        .action-buttons button:hover, .action-buttons .button:hover { /* Hover effect for action buttons */
            background-color: #c31fcb; /* Slightly darker shade for hover */
        }
        
        /* Style for anchor button */
        .button {
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
            text-align: center;
            border-radius: 5px;
            font-size: 14px;
        }
        
        /* Responsive adjustments */
        @media (max-width: 600px) {
            body {
                padding: 15px 10px;
            }
            h1 {
                font-size: 1.4rem;
                margin-bottom: 0.8rem;
            }
            .header-container h1 {
                font-size: 1.3rem;
            }
            .button-container {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
                margin: 15px 0;
            }
            button, .button, .assistant-btn {
                padding: 10px 15px;
                font-size: 14px;
                margin: 0;
                min-width: calc(50% - 8px);
                flex: 0 0 calc(50% - 8px);
            }
            
            .assistant-btn {
                flex: 0 0 100%;
                min-width: 100%;
                justify-content: center;
                white-space: nowrap;
            }
            
            .stethoscope-svg {
                width: 16px;
                height: 16px;
                margin-right: 5px;
                vertical-align: middle;
            }
            #recipe-display {
                padding: 15px;
                margin-top: 15px;
                max-height: 60vh; /* Taller on mobile */
            }
            #recipe-display h2 {
                font-size: 1.2rem;
            }
            .action-buttons button, .action-buttons .button {
                min-width: 0;
                padding: 8px 5px;
                font-size: 13px;
                flex: 1;
            }
            .logo-container {
                margin-bottom: 10px;
                width: 150px;
            }
            .tagline {
                font-size: 13px;
                margin: 8px 0 12px 0;
            }
        }
    </style>
</head>

    <!-- Authentication script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userSection = document.getElementById('user-section');
            
            // Function to update UI based on authentication status
            function updateAuthUI(isLoggedIn, user) {
                if (isLoggedIn && user) {
                    // Use the actual username from the user object
                    const displayName = user.username || user.email.split('@')[0] || 'Utilizator';
                    
                    userSection.innerHTML = `
                        <button id="logout-btn" style="background-color: #db23e8; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; min-width: 80px; margin: 0; font-size: 12px; text-align: center; display: flex; align-items: center; justify-content: center;">Deconectare</button>
                    `;
                    
                    // Add logout functionality
                    document.getElementById('logout-btn').addEventListener('click', function() {
                        fetch('/api/auth/logout')
                            .then(response => response.json())
                            .then(data => {
                                if (data.success) {
                                    window.location.reload();
                                }
                            })
                            .catch(error => {
                                console.error('Error during logout:', error);
                            });
                    });
                } else {
                    userSection.innerHTML = `
                        <a href="login.html" style="background-color: #db23e8; color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; min-width: 80px; text-align: center; font-size: 12px;">Autentificare</a>
                    `;
                }
            }
            
            // Check authentication status
            fetch('/api/auth/status')
                .then(response => response.json())
                .then(data => {
                    updateAuthUI(data.isLoggedIn, data.user);
                })
                .catch(error => {
                    console.error('Error checking auth status:', error);
                    updateAuthUI(false);
                });
        });
    </script>
    
    <!-- Regime selection script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log("Initializing regime buttons...");
            
            // Variabilă globală pentru urmărirea regimului selectat
            window.selectedRegime = localStorage.getItem('selectedRegime') || null;
            console.log("Initial regime from localStorage:", window.selectedRegime);
            
            // Inițializarea butoanelor de regim
            function initializeRegimeButtons() {
                const btnRegimeSanatos = document.getElementById('btn-regime-sanatos');
                const btnRegimeDiabetic = document.getElementById('btn-regime-diabetic');
                const mealButtons = document.querySelectorAll('.meal-button');
                
                console.log("Found meal buttons:", mealButtons.length);
                
                // Verifică dacă există un regim salvat și actualizează interfața
                if (window.selectedRegime) {
                    console.log("Activating saved regime:", window.selectedRegime);
                    
                    if (window.selectedRegime === 'sanatos') {
                        btnRegimeSanatos.classList.add('active');
                    } else {
                        btnRegimeDiabetic.classList.add('active');
                    }
                    
                    // Activează butoanele de mese
                    mealButtons.forEach(button => {
                        button.classList.remove('disabled');
                        button.disabled = false;
                    });
                }
                
                // Asigură-te că ambele butoane există înainte de a adăuga event listeners
                if (btnRegimeSanatos && btnRegimeDiabetic) {
                    // Adaugă event listeners pentru butoanele de regim
                    btnRegimeSanatos.addEventListener('click', function() {
                        console.log("Selecting regime: sanatos");
                        selectRegime('sanatos');
                    });
                    
                    btnRegimeDiabetic.addEventListener('click', function() {
                        console.log("Selecting regime: diabetic");
                        selectRegime('diabetic');
                    });
                } else {
                    console.error("Regime buttons not found in DOM");
                }
            }
            
            // Funcție pentru selectarea unui regim
            function selectRegime(regime) {
                window.selectedRegime = regime;
                localStorage.setItem('selectedRegime', regime);
                console.log("Regime selected and saved:", regime);
                
                // Actualizează interfața
                const btnRegimeSanatos = document.getElementById('btn-regime-sanatos');
                const btnRegimeDiabetic = document.getElementById('btn-regime-diabetic');
                const mealButtons = document.querySelectorAll('.meal-button');
                
                // Actualizează butoanele de regim
                if (btnRegimeSanatos && btnRegimeDiabetic) {
                    btnRegimeSanatos.classList.toggle('active', regime === 'sanatos');
                    btnRegimeDiabetic.classList.toggle('active', regime === 'diabetic');
                }
                
                // Activează butoanele de mese
                console.log("Enabling meal buttons");
                mealButtons.forEach(button => {
                    button.classList.remove('disabled');
                    button.disabled = false;
                });
            }
            
            // Inițializează butoanele de regim
            initializeRegimeButtons();
            
            // Forțează selectarea unui regim dacă nu există niciunul (pentru debugging)
            if (!window.selectedRegime) {
                console.log("No regime selected, defaulting to diabetic for testing");
                selectRegime('diabetic');
            }
        });
    </script>
